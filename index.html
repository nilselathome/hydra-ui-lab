<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Hydra Layer Mixer (Instant Color)</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: black;
      overflow: hidden;
      height: 100%;
    }
    canvas {
      width: 100vw;
      height: 100vh;
      display: block;
    }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.5);
      padding: 8px;
      border-radius: 12px;
      color: white;
      font-family: sans-serif;
    }
  </style>
</head>
<body>
  <canvas id="hydraCanvas"></canvas>
  <div id="ui"></div>

  <script src="https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.min.js"></script>
  <script type="module">
    import { Pane } from 'https://cdn.jsdelivr.net/npm/tweakpane@4.0.5/dist/tweakpane.min.js';

    // --- Hydra setup ---
    const canvas = document.getElementById('hydraCanvas');
    const hydra = new Hydra({ canvas, makeGlobal: true, detectAudio: false });

    const pane = new Pane({ container: document.getElementById('ui') });

    const layerDefs = {
      osc: {
        args: [
          { key: 'frequency', min: 0, max: 60, default: 10 },
          { key: 'sync', min: 0, max: 1, default: 0.2 },
          { key: 'offset', min: -1, max: 1, default: 0 },
        ],
      },
      shape: {
        args: [
          { key: 'sides', min: 3, max: 12, default: 3 },
          { key: 'radius', min: 0, max: 1, default: 0.5 },
          { key: 'smoothing', min: 0, max: 1, default: 0.01 },
        ],
      },
      voronoi: {
        args: [
          { key: 'scale', min: 1, max: 50, default: 5 },
          { key: 'speed', min: 0, max: 2, default: 0.1 },
          { key: 'blend', min: 0, max: 1, default: 0.3 },
        ],
      },
    };

    let layers = [];
    const blendOptions = {
      Add: 'add',
      Blend: 'blend',
      Multiply: 'mult',
      Difference: 'diff',
    };

    const outputs = [o0, o1, o2, o3];

    // --- UI setup ---
    const addButtons = pane.addFolder({ title: 'Add Layer' });
    addButtons.addButton({ title: 'Oscillator' }).on('click', () => addLayer('osc'));
    addButtons.addButton({ title: 'Shape' }).on('click', () => addLayer('shape'));
    addButtons.addButton({ title: 'Voronoi' }).on('click', () => addLayer('voronoi'));

    function addLayer(type) {
      const def = layerDefs[type];
      if (!def) return;

      const params = {};
      def.args.forEach(a => (params[a.key] = a.default));

      const output = outputs[layers.length % outputs.length];
      const layer = { type, params, blendMode: 'add', output };

      layers.push(layer);

      const f = pane.addFolder({ title: `Layer ${layers.length}: ${type}` });
      def.args.forEach(a => {
        f.addBinding(params, a.key, { min: a.min, max: a.max }).on('change', render);
      });

      f.addBinding(layer, 'blendMode', { options: blendOptions }).on('change', render);

      render();
    }

    function render() {
      // Draw each layer to its own buffer
      layers.forEach(layer => {
        const def = layerDefs[layer.type];
        let node = window[layer.type](...def.args.map(a => layer.params[a.key]));

        // Add color modulation based on type
        if (layer.type === 'osc') {
          node = node.colorama(0.5).hue(0.2).saturate(1.5);
        }
        if (layer.type === 'voronoi') {
          node = node.color(1.2, 0.7, 1).saturate(1.2);
        }
        if (layer.type === 'shape') {
          node = node.color(0.5, 1, 2).rotate(0.2, 0.1);
        }

        node.out(layer.output);
      });

      // Combine all layers
      if (layers.length > 0) {
        let node = src(layers[0].output);
        for (let i = 1; i < layers.length; i++) {
          const mode = layers[i].blendMode;
          node = node[mode](src(layers[i].output), 0.5);
        }
        node.out();
      }
    }

    // --- Colorful default layer ---
    osc(20, 0.05, 1.2)
      .colorama(0.4)
      .hue(0.3)
      .saturate(2.5)
      .rotate(0.2, 0.1)
      .out(o0);

    // ✅ Explicitly show the buffer
    src(o0).out();

    // Create layer in UI
    addLayer('osc');
  </script>
</body>
</html>
