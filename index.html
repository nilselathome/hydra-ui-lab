<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hydra Playground</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@phosphor-icons/web@2.1.2/src/bold/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700;900&family=Open+Sans:wght@400;700;800&family=Montserrat:wght@400;700;900&family=Lato:wght@400;700;900&family=Oswald:wght@400;700&family=Raleway:wght@400;700;900&family=Poppins:wght@400;700;900&family=Playfair+Display:wght@400;700;900&family=Merriweather:wght@400;700;900&family=Nunito:wght@400;700;900&family=Ubuntu:wght@400;700&family=PT+Sans:wght@400;700&family=Roboto+Condensed:wght@400;700&family=Roboto+Mono:wght@400;700&family=Source+Code+Pro:wght@400;700&family=Inconsolata:wght@400;700&family=Bebas+Neue&family=Righteous&family=Pacifico&family=Lobster&family=Press+Start+2P&family=Space+Grotesk:wght@400;700&family=DM+Sans:wght@400;700;900&family=Anton&family=Abril+Fatface&display=swap">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden; }
    canvas { display: block; width: 100vw; height: 100vh; }

    #ui {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9999;
      max-height: calc(100vh - 24px);
      overflow-y: auto;
      /* Tweakpane renders inside here */
    }

    #autoplay-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 1.25rem;
      font-family: sans-serif;
      letter-spacing: 0.05em;
      z-index: 99999;
      cursor: pointer;
      opacity: 1;
      transition: opacity 0.5s ease;
    }
    #autoplay-overlay.fade-out {
      opacity: 0;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="hydraCanvas"></canvas>
  <div id="ui"></div>
  <div id="autoplay-overlay"><span>Press any key to play</span></div>

  <script src="https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.min.js"></script>
  <script type="module" src="/src/app.js"></script>
  <script type="module">
    import { playFile } from '/src/audio.js';
    import { loadFromUrl } from '/src/state.js';

    const overlay = document.getElementById('autoplay-overlay');
    const savedState = loadFromUrl();

    if (!savedState?.ui?.audioTrack) {
      overlay.remove();
    } else {
      function dismiss() {
        playFile();
        overlay.classList.add('fade-out');
        overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
        document.removeEventListener('keydown', dismiss);
        document.removeEventListener('click', dismiss);
      }

      document.addEventListener('keydown', dismiss);
      document.addEventListener('click', dismiss);
    }
  </script>
</body>
</html>
